[build]
buildCommand = "npm install && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate resolve --applied 20260423015648_init_completo 2>/dev/null; npx prisma migrate deploy || true && node src/app.js"
healthcheckPath = "/api/portal/opcoes"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
